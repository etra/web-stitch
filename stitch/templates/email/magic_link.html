<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #4a90d9; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .button { display: inline-block; background: #4a90d9; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; margin: 10px 0; }
        .footer { padding: 20px; text-align: center; color: #666; font-size: 12px; }
        .warning { color: #666; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sign in to Web Stitch</h1>
        </div>
        <div class="content">
            <p>Hello{{ ' ' + user.email if user else '' }},</p>

            <p>Click the button below to sign in to your Web Stitch account:</p>

            <p style="text-align: center;">
                <a href="{{ magic_link }}" class="button">Sign In</a>
            </p>

            <p class="warning">This link will expire in 15 minutes.</p>

            <p class="warning">If you didn't request this email, you can safely ignore it.</p>
        </div>
        <div class="footer">
            <p>The Web Stitch Team</p>
        </div>
    </div>
</body>
</html>
