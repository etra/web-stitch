<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #4a90d9; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .button { display: inline-block; background: #4a90d9; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; margin: 10px 0; }
        .footer { padding: 20px; text-align: center; color: #666; font-size: 12px; }
        .pattern-name { font-size: 18px; font-weight: bold; color: #4a90d9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>A Pattern Was Shared With You!</h1>
        </div>
        <div class="content">
            <p>Hello,</p>

            <p><strong>{{ sender_name }}</strong> has shared a cross-stitch pattern with you:</p>

            <p class="pattern-name">"{{ pattern_name }}"</p>

            <p style="text-align: center;">
                <a href="{{ pattern_url }}" class="button">View Pattern</a>
            </p>

            <p>Happy stitching!</p>
        </div>
        <div class="footer">
            <p>The Web Stitch Team</p>
        </div>
    </div>
</body>
</html>
