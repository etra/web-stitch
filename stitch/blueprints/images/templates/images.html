{% extends "base.html" %}

{% block title %}Images - Web Stitch{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col">
            <h1>Image Gallery</h1>
            <p class="text-muted">Upload and manage your images</p>
        </div>
    </div>

    <!-- Image upload -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Upload Image</h5>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <input class="form-control" type="file" name="image" accept="image/*" required>
                    <div class="form-text">
                        Supported formats: JPG, PNG, GIF (max 16MB)
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Upload</button>
            </form>
        </div>
    </div>

    <!-- Image gallery will be here -->
    <div class="alert alert-info">
        <p class="mb-0">
            <strong>Coming soon:</strong> Image upload and gallery features will be implemented here.
        </p>
    </div>
</div>
{% endblock %}
